<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>__TITLE__ Image Downloader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: __BG_COLOR__;
    color: __TEXT_COLOR__;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px;
  }
  h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: -0.5px; }
  .subtitle { color: __MUTED_COLOR__; margin-bottom: 32px; font-size: 15px; }
  #btn {
    background: __ACCENT_COLOR__;
    color: white; border: none; padding: 16px 48px; font-size: 16px;
    font-weight: 700; letter-spacing: 2px; border-radius: 6px;
    cursor: pointer; text-transform: uppercase;
  }
  #btn:hover { opacity: 0.85; }
  #btn:disabled { opacity: 0.4; cursor: wait; }
  #log {
    margin-top: 24px; font-size: 13px; color: __MUTED_COLOR__;
    max-width: 600px; text-align: center; line-height: 1.8;
  }
  .done { color: __TEXT_COLOR__; }
  .err { color: #B84A3A; }
</style>
</head>
<body>
  <h1>__TITLE__</h1>
  <p class="subtitle">__SUBTITLE__</p>
  <button id="btn" onclick="downloadAll()">DOWNLOAD ZIP</button>
  <div id="log"></div>

<script>
// ============================================================
// CUSTOMIZE THIS ARRAY — one entry per image
// { name: "filename.ext", url: "full URL to the image" }
// ============================================================
const IMAGES = __IMAGES_JSON__;

const ZIP_FILENAME = "__ZIP_FILENAME__";

async function downloadAll() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'DOWNLOADING...';
  log.innerHTML = '';

  const zip = new JSZip();
  let ok = 0;
  let fail = 0;

  for (const img of IMAGES) {
    try {
      const r = await fetch(img.url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const blob = await r.blob();
      zip.file(img.name, blob);
      ok++;
      log.innerHTML += '<span class="done">' + img.name + ' (' + Math.round(blob.size/1024) + 'KB)</span><br>';
    } catch(e) {
      fail++;
      log.innerHTML += '<span class="err">' + img.name + ' — failed (' + e.message + ')</span><br>';
    }
  }

  log.innerHTML += '<br><span class="done">Generating zip with ' + ok + ' images...</span><br>';

  const content = await zip.generateAsync({ type: 'blob' });
  const u = URL.createObjectURL(content);
  const a = document.createElement('a');
  a.href = u;
  a.download = ZIP_FILENAME;
  a.click();
  URL.revokeObjectURL(u);

  btn.textContent = 'DONE';
  const size = (content.size / 1024 / 1024).toFixed(1);
  let summary = ok + ' images zipped (' + size + ' MB)';
  if (fail > 0) summary += ' · ' + fail + ' failed';
  log.innerHTML += '<br><span class="done">' + summary + '</span>';
}
</script>
</body>
</html>
